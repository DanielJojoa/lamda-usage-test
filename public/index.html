<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload a S3</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Subir Archivo a S3</h1>
      <p class="subtitle">Selecciona un archivo y súbelo al bucket configurado.</p>

      <form id="uploadForm">
        <input id="fileInput" name="file" type="file" required />
        <button type="submit">Subir archivo</button>
      </form>

      <div id="status" class="status" aria-live="polite"></div>

      <section class="files-section">
        <div class="files-header">
          <h2>Archivos en DynamoDB</h2>
          <button id="refreshFilesBtn" type="button">Refrescar</button>
        </div>
        <div id="filesStatus" class="status" aria-live="polite"></div>
        <ul id="filesList" class="files-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
